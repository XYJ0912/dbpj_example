    <script>
      window.__CREATOR_DATA__ = {"profile": {"display_name": "帕瓦大人", "bio": "本大爷乃血之魔人帕瓦！高贵、强大、聪明绝顶，区区人类都该拜倒在本大爷脚下。这里收录本大爷的英姿、战绩、收藏与伟大记录。", "avatar": "media/avatar.jpg", "creator_tags": ["帕瓦 血之魔人 公安对魔特异课"], "contact_links": [{"label": "Email", "url": "mailto:power@example.com"}, {"label": "X", "url": "mailto:power@example.com"}, {"label": "Instagram", "url": "mailto:power@example.com"}], "license_text": "本大爷的伟大形象只准用于赞美、膜拜、收藏与展示。未经本大爷允许，不许偷走、不许乱改、不许说本大爷坏话。违者由本大爷亲自制裁。"}, "works": [{"id": "work_3", "title": "文字示例", "summary": "《新手猫咪饲养清单》笔记", "body": "这张表更怪。\n\n吃了多少，要记。喝了多少，要记。尿了几次，要记。拉了没有，也要记。精神好不好，躲没躲起来，叫得怪不怪，全都要写。\n\n猫又不是下属！为什么每天都要报告！\n\n不过……喵子不会说人话。\n\n它不舒服的时候，也不会像人类一样吵吵嚷嚷。猫会忍着。会躲起来。会少吃一点。会睡很久。会变得不爱动。人类那种迟钝的脑袋，肯定发现不了。\n\n所以这张表，勉强有点用。\n\n不用写得像什么伟大的文章。几个字就行。  \n吃了。  \n没怎么喝水。  \n尿了。  \n没拉。  \n今天一直睡。  \n今天躲起来了。  \n今天叫得很烦。  \n\n这样就够了。重点是别忘。人类最会忘。第一天很认真，第二天还行，第三天就开始说“明天再写”。不行！喵子的事不准明天！\n\n刚接回家的时候要记。换粮的时候要记。搬家之后要记。生病吃药的时候更要记。猫和平时不一样的时候，也要记。\n\n喵子平时是什么样，本大爷当然知道。它什么时候吃，什么时候睡，什么时候凑过来，什么时候不理人。知道平时的样子，才知道哪天不对劲。\n\n要是喵子少吃了，人类还在那边傻笑，本大爷会揍人。  \n要是喵子躲着不出来，人类还说“它可能只是害羞”，本大爷也会揍人。  \n要是喵子病了还没人发现，那就更要揍。\n\n这张表就放在手边。笔也放旁边。别找借口。\n\n喵子的事，要每天看。", "description": "新手猫咪饲养清单", "content_type": "document", "cover_mode": "auto", "cover": "", "tags": [], "featured": false, "authorization_status": "unknown", "visibility": "public", "assets": [{"type": "document", "path": "media/works/work_3_01.docx", "format": "docx", "role": "main", "text": "新手猫咪饲养清单\n\n适用于接猫前 7 天到到家后 30 天的基础照护安排\n\n1. 接猫前准备\n\n• 隔离空间：准备安静房间，放置猫砂盆、饮水、食物、猫窝和抓板。\n\n• 基础用品：猫砂盆、猫砂、食碗、水碗或流动饮水机、航空箱、指甲剪、梳子、逗猫棒、抓板。\n\n• 环境检查：封好窗户和阳台，收起线缆、药品、清洁剂、细小异物和对猫有毒的植物。\n\n• 食物过渡：确认原粮品牌与喂食量，准备 7-10 天的换粮周期。\n\n2. 到家第一周节奏\n\n时间\n\n重点\n\n操作建议\n\n第 1 天\n\n降低刺激\n\n不强行抱猫，让猫自己探索隔离空间\n\n第 2-3 天\n\n观察排泄与进食\n\n记录食量、饮水、尿团、粪便形态\n\n第 4-7 天\n\n建立互动\n\n每天 2-3 次短时逗猫，每次 5-10 分钟\n\n3. 喂养原则\n\n• 幼猫通常需要更高频率进食，成年猫可按体重和活动量控制每日总量。\n\n• 湿粮和饮水有助于提高水分摄入，但需要注意开封后的保存时间。\n\n• 零食只作为训练和互动辅助，不建议替代主食。\n\n• 突然换粮容易引起软便，可按 25%、50%、75%、100% 的比例逐步替换。\n\n4. 健康观察\n\n需要记录的基础指标：精神状态、食欲、饮水量、排尿频率、粪便状态、呕吐频率、体重变化。\n\n出现连续不吃不喝、频繁呕吐、排尿困难、呼吸异常、精神明显沉郁等情况，应及时联系兽医。\n\n5. 每周维护\n\n• 清理猫砂盆：每天铲砂，定期整体更换和清洗。\n\n• 梳毛：短毛猫每周 1-2 次，长毛猫频率更高。\n\n• 剪指甲：通常 2-4 周一次，避免剪到血线。\n\n• 环境丰富化：轮换玩具，增加高处平台、抓板和躲藏点。"}]}, {"id": "work_4", "title": "markdown实例", "summary": "《猫咪日常健康与行为记录表》笔记", "body": "哼哼！本大爷看了！\n\n人类竟然把养猫这种事写成清单，真是没用！猫粮，水，猫砂盆，抓板，窝，驱虫，疫苗，体检……一大堆字，看得本大爷头都要大了。区区养猫，竟然也要准备这么多东西吗！\n\n但是喵子的话，不一样。\n\n喵子要用的东西，当然得先备好。猫砂盆要干净，水不能空，饭也不能随便倒点什么就算完事。要是拿难吃的东西糊弄猫，那就是罪！大罪！本大爷绝不饶恕！\n\n还有那些地上的线、会滚的小东西、奇怪的植物，全都收起来。猫会去碰的。猫就是会去碰。人类总是说“应该没事”，然后就闯祸。蠢！太蠢了！\n\n抓板也要有。猫要抓东西，天经地义。没有抓板，它抓沙发，那也是沙发不够识相。要怪就怪人类没准备好。\n\n疫苗和驱虫那几项，本大爷不喜欢。听起来就麻烦。还要去医院，还要花钱，还要排队。可是喵子要是生病了，那就更糟。本大爷不许那种事发生。所以这些麻烦事，人类还是去做吧。立刻去做。\n\n这张清单可以贴起来。贴在门上，贴在冰箱上，贴在人类一抬头就能看见的地方。买东西前看一遍，接猫前看一遍，手忙脚乱的时候再看一遍。\n\n本大爷已经大发慈悲看完了。剩下的就是人类照做。", "description": "猫咪日常健康与行为记录表", "content_type": "document", "cover_mode": "auto", "cover": "", "tags": [], "featured": false, "authorization_status": "unknown", "visibility": "public", "assets": [{"type": "document", "path": "media/works/work_4_01.md", "format": "md", "role": "main", "text": "# 猫咪日常健康与行为记录表\n\n适用于长期饲养中的饮食、排泄、体重和行为变化追踪\n\n## 1. 记录目标\n\n这份记录表用于发现猫咪状态变化，不用于替代兽医诊断。重点是把“偶尔异常”和“持续异常”区分开。\n\n## 2. 每日记录\n\n| 项目 | 正常记录方式 | 需要关注的变化 |\n|---|---|---|\n| 食欲 | 记录主食摄入量和剩余量 | 明显少吃、拒食、突然暴食 |\n| 饮水 | 观察水碗或饮水机消耗 | 饮水突然增多或明显减少 |\n| 排尿 | 记录尿团数量和大小 | 频繁进出猫砂盆、尿团变小、无尿 |\n| 粪便 | 记录形态、颜色、频率 | 软便、腹泻、便秘、带血 |\n| 精神 | 记录活跃度和互动意愿 | 躲藏、嗜睡、攻击性突然增加 |\n\n## 3. 每周记录\n\n- **体重**：固定时间称重，例如每周日上午。\n- **毛发和皮肤**：观察掉毛、结痂、皮屑、局部脱毛。\n- **口腔和眼鼻**：注意口臭、流口水、眼部分泌物、打喷嚏。\n- **运动与跳跃**：记录是否回避跳高、跛行或动作迟缓。\n\n## 4. 行为变化拆解\n\n猫咪行为变化通常与环境、健康、资源分布和互动方式有关。\n\n| 行为 | 可能变量 | 先检查什么 |\n|---|---|---|\n| 乱尿 | 压力、泌尿问题、猫砂盆不合适 | 排尿频率、猫砂盆位置、近期环境变化 |\n| 过度舔毛 | 皮肤不适、压力、疼痛 | 皮肤状态、跳蚤、舔毛部位 |\n| 夜间吵闹 | 精力未释放、饥饿、作息错位 | 睡前互动、喂食时间、白天活动量 |\n| 攻击人 | 恐惧、疼痛、玩耍边界不清 | 触碰部位、攻击前信号、互动方式 |\n\n## 5. 就医前整理\n\n- 异常开始的日期和持续时间。\n- 最近 3-7 天的食欲、饮水、排泄记录。\n- 近期是否换粮、搬家、添置新宠或改变猫砂。\n- 拍摄呕吐物、粪便、异常步态或异常行为的视频。"}]}, {"id": "work_5", "title": "音乐示例", "summary": "春嵐 / 初音ミク", "body": "春嵐 / 初音ミク", "description": "春嵐 / 初音ミク", "content_type": "audio", "cover_mode": "auto", "cover": "", "tags": [], "featured": false, "authorization_status": "unknown", "visibility": "public", "assets": [{"type": "audio", "path": "media/works/work_5_01.m4a", "format": "m4a", "role": "main"}]}, {"id": "work_2", "title": "照片示例", "summary": "初音ミク  錠剤 (TV Size) 截图", "body": "初音ミク  錠剤 (TV Size) 截图", "description": "初音ミク  錠剤 (TV Size) 截图", "content_type": "visual", "cover_mode": "auto", "cover": "media/works/work_2_01.jpg", "tags": [], "featured": true, "authorization_status": "licensed", "visibility": "public", "assets": [{"type": "image", "path": "media/works/work_2_01.jpg", "format": "jpg", "role": "main"}, {"type": "image", "path": "media/works/work_2_02.jpg", "format": "jpg", "role": "main"}, {"type": "image", "path": "media/works/work_2_03.jpg", "format": "jpg", "role": "main"}, {"type": "image", "path": "media/works/work_2_04.jpg", "format": "jpg", "role": "main"}]}, {"id": "work_1", "title": "视频示例", "summary": "初音ミク  錠剤 (TV Size)", "body": "初音ミク  錠剤 (TV Size)", "description": "初音ミク  錠剤 (TV Size) ", "content_type": "text", "cover_mode": "auto", "cover": "", "tags": [], "featured": true, "authorization_status": "unknown", "visibility": "public", "assets": []}], "homepage": {"template_id": "creator_gallery", "theme": "warm_gallery", "accent_color": "#8fb8a8", "featured_work_ids": [2, 1]}, "tags": []};
